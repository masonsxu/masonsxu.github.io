<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#1A1A1D" />
            <stop offset="100%" stop-color="#0C0C0E" />
        </radialGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="512" height="512" rx="128" fill="url(#bgGradient)" />
    
    <!-- Geometric Architecture Mark (MX) -->
    <g transform="translate(156, 156)" stroke="#D4AF37" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
        <!-- Outer Frame -->
        <path d="M0,40 L100,0 L200,40 L200,160 L100,200 L0,160 Z" opacity="0.3" />
        
        <!-- MX Intersect -->
        <path d="M20,160 L20,40 L100,100 L180,40 L180,160" stroke-width="12" />
        <path d="M60,60 L140,140 M140,60 L60,140" stroke-width="12" opacity="0.8" />
    </g>
    
    <!-- Polaris Star -->
    <g transform="translate(256, 256)" filter="url(#glow)">
        <!-- Vertical Ray -->
        <line x1="0" y1="-30" x2="0" y2="30" stroke="#FCFCFC" stroke-width="4" />
        <!-- Horizontal Ray -->
        <line x1="-30" y1="0" x2="30" y2="0" stroke="#FCFCFC" stroke-width="4" />
        <!-- Diagonal Rays -->
        <line x1="-15" y1="-15" x2="15" y2="15" stroke="#FCFCFC" stroke-width="2" />
        <line x1="15" y1="-15" x2="-15" y2="15" stroke="#FCFCFC" stroke-width="2" />
        <!-- Center Dot -->
        <circle r="4" fill="#D4AF37" />
    </g>
</svg>
