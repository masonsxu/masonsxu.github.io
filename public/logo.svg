<svg width="512" height="512" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" style="image-rendering: pixelated;">
  <defs>
    <style>
      .bg { fill: #0C0C0E; }
      .dark { fill: #1E1E21; }
      .gold { fill: #D4AF37; }
      .accent { fill: #F2D288; }
      .pearl { fill: #FCFCFC; }
      * { shape-rendering: crispEdges; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" class="bg" />

  <!-- Frame -->
  <g class="dark">
    <rect x="0" y="0" width="32" height="1" />
    <rect x="0" y="31" width="32" height="1" />
    <rect x="0" y="1" width="1" height="30" />
    <rect x="31" y="1" width="1" height="30" />
  </g>

  <!-- Corner accents -->
  <g class="gold" opacity="0.5">
    <rect x="1" y="1" width="1" height="1" />
    <rect x="30" y="1" width="1" height="1" />
    <rect x="1" y="30" width="1" height="1" />
    <rect x="30" y="30" width="1" height="1" />
  </g>

  <!-- Constellation dots -->
  <rect x="2" y="8" width="1" height="1" class="accent" opacity="0.3" />
  <rect x="29" y="8" width="1" height="1" class="accent" opacity="0.3" />
  <rect x="15" y="2" width="2" height="1" class="pearl" opacity="0.15" />
  <rect x="3" y="25" width="1" height="1" class="accent" opacity="0.4" />
  <rect x="28" y="25" width="1" height="1" class="accent" opacity="0.4" />

  <!-- Tech dots -->
  <g class="gold" opacity="0.2">
    <rect x="11" y="27" width="2" height="1" />
    <rect x="15" y="27" width="2" height="1" />
    <rect x="19" y="27" width="2" height="1" />
  </g>

  <!-- ═══ TAURUS ═══ -->

  <!-- Left Horn (accent tips + gold body, curves outward then up) -->
  <rect x="4" y="4" width="2" height="1" class="accent" />
  <rect x="3" y="5" width="1" height="2" class="accent" />
  <rect x="4" y="5" width="1" height="2" class="gold" />
  <rect x="4" y="7" width="2" height="1" class="gold" />
  <rect x="5" y="8" width="2" height="1" class="gold" />
  <rect x="6" y="9" width="3" height="1" class="gold" />

  <!-- Right Horn (mirrored) -->
  <rect x="26" y="4" width="2" height="1" class="accent" />
  <rect x="28" y="5" width="1" height="2" class="accent" />
  <rect x="27" y="5" width="1" height="2" class="gold" />
  <rect x="26" y="7" width="2" height="1" class="gold" />
  <rect x="25" y="8" width="2" height="1" class="gold" />
  <rect x="23" y="9" width="3" height="1" class="gold" />

  <!-- Head -->
  <g class="gold">
    <rect x="9" y="9" width="14" height="1" />
    <rect x="7" y="10" width="18" height="2" />
    <rect x="8" y="12" width="16" height="4" />
    <rect x="9" y="16" width="14" height="1" />
    <rect x="10" y="17" width="12" height="1" />
    <rect x="11" y="18" width="10" height="1" />
    <rect x="12" y="19" width="8" height="1" />
    <rect x="13" y="20" width="6" height="1" />
    <rect x="14" y="21" width="4" height="1" />
  </g>

  <!-- Ears (accent tip + gold base) -->
  <rect x="5" y="10" width="1" height="1" class="accent" />
  <rect x="6" y="10" width="1" height="2" class="gold" />
  <rect x="26" y="10" width="1" height="1" class="accent" />
  <rect x="25" y="10" width="1" height="2" class="gold" />

  <!-- Forehead mark -->
  <rect x="15" y="11" width="2" height="1" class="accent" opacity="0.6" />

  <!-- Eye sockets -->
  <rect x="10" y="13" width="3" height="2" class="dark" />
  <rect x="19" y="13" width="3" height="2" class="dark" />

  <!-- Eyes -->
  <rect x="10" y="13" width="2" height="2" class="pearl" />
  <rect x="20" y="13" width="2" height="2" class="pearl" />

  <!-- Eye glints -->
  <rect x="10" y="13" width="1" height="1" class="accent" />
  <rect x="21" y="13" width="1" height="1" class="accent" />

  <!-- Pupils -->
  <rect x="11" y="14" width="1" height="1" class="bg" />
  <rect x="20" y="14" width="1" height="1" class="bg" />

  <!-- Nostrils -->
  <rect x="13" y="17" width="1" height="1" class="dark" />
  <rect x="18" y="17" width="1" height="1" class="dark" />

  <!-- Nose ring (the "Pearl" in Midnight Pearl) -->
  <rect x="14" y="18" width="1" height="1" class="pearl" />
  <rect x="17" y="18" width="1" height="1" class="pearl" />
  <rect x="15" y="19" width="2" height="1" class="pearl" />
</svg>
