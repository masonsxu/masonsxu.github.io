<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <!-- Dot grid pattern -->
    <pattern id="dotGrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(212,175,55,0.12)"/>
    </pattern>

    <!-- Gold radial glow top-left -->
    <radialGradient id="glowTL" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#D4AF37" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle glow bottom-right -->
    <radialGradient id="glowBR" cx="100%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>

    <!-- Gold horizontal gradient for text -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F2D288"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>

    <!-- Gold gradient for divider -->
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0"/>
      <stop offset="20%" stop-color="#D4AF37" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#D4AF37" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </linearGradient>

    <!-- Constellation line gradient -->
    <linearGradient id="constellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D4AF37" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </linearGradient>

    <!-- Border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#D4AF37" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Clip path for outer border -->
    <clipPath id="outerClip">
      <rect x="0" y="0" width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="630" fill="#0C0C0E"/>

  <!-- Dot grid -->
  <rect width="1200" height="630" fill="url(#dotGrid)" opacity="1"/>

  <!-- Gold glow layers -->
  <rect width="1200" height="630" fill="url(#glowTL)"/>
  <rect width="1200" height="630" fill="url(#glowBR)"/>

  <!-- Subtle top-left warm oval glow -->
  <ellipse cx="180" cy="160" rx="340" ry="240" fill="#D4AF37" fill-opacity="0.05"/>

  <!-- ── Constellation decoration (bottom-right) ── -->
  <g opacity="0.35" stroke="url(#constellGrad)" stroke-width="1" fill="none">
    <path d="M820,410 L920,370 L1010,420 L1100,380"/>
    <path d="M920,370 L900,480 L960,550"/>
    <path d="M1010,420 L1060,500 L1140,530"/>
    <path d="M900,480 L1000,510"/>
  </g>
  <!-- Constellation dots -->
  <g fill="#D4AF37" opacity="0.5">
    <circle cx="820" cy="410" r="2.5"/>
    <circle cx="920" cy="370" r="3.5"/>
    <circle cx="1010" cy="420" r="2"/>
    <circle cx="1100" cy="380" r="2"/>
    <circle cx="900" cy="480" r="3"/>
    <circle cx="960" cy="550" r="2"/>
    <circle cx="1060" cy="500" r="2"/>
    <circle cx="1140" cy="530" r="1.5"/>
    <circle cx="1000" cy="510" r="1.5"/>
  </g>

  <!-- ── Outer border frame ── -->
  <rect x="24" y="24" width="1152" height="582" rx="4" fill="none" stroke="url(#borderGrad)" stroke-width="1"/>
  <!-- inner accent line -->
  <rect x="30" y="30" width="1140" height="570" rx="2" fill="none" stroke="#D4AF37" stroke-opacity="0.06" stroke-width="1"/>

  <!-- ── Top bar: Logo + brand name ── -->
  <!-- Logo badge - personal brand mark -->
  <g transform="translate(56, 52)">
    <rect x="0" y="0" width="38" height="38" rx="6" fill="#0C0C0E" stroke="#D4AF37" stroke-opacity="0.4" stroke-width="1"/>
    <g fill="none" stroke="#D4AF37" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 28V10L15 19L19 15L23 19L30 10V28"/>
      <path d="M8 12L15 27L19 21L23 27L30 12"/>
    </g>
    <path d="M14 21L26 21M20 15L20 27" fill="none" stroke="#FCFCFC" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Brand name -->
  <text x="106" y="76" font-family="'Courier New', 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="3" fill="#A1A1AA">MASONS.XU</text>

  <!-- Top-right: status tag -->
  <rect x="986" y="52" width="135" height="28" rx="14" fill="#1E1E21" stroke="#D4AF37" stroke-opacity="0.25" stroke-width="1"/>
  <circle cx="1004" cy="66" r="4" fill="#F59E0B"/>
  <text x="1022" y="70" font-family="'Noto Sans SC', 'Courier New', monospace" font-size="11" fill="#A1A1AA">Actively Seeking</text>

  <!-- ── Main content block ── -->
  <!-- Chinese name -->
  <text x="60" y="230" font-family="'Noto Sans SC', sans-serif" font-size="96" font-weight="700" fill="#FCFCFC" letter-spacing="-2">徐俊飞</text>

  <!-- English name (italic, gold-toned) -->
  <text x="66" y="282" font-family="'Noto Sans SC', sans-serif" font-size="38" font-style="italic" font-weight="400" fill="#D4AF37" fill-opacity="0.75" letter-spacing="1">Masons Xu</text>

  <!-- Role title with gradient -->
  <text x="60" y="348" font-family="'Noto Sans SC', sans-serif" font-size="40" font-weight="700" fill="url(#goldGrad)" letter-spacing="1">Go 后端工程师 · 分布式系统 · 云原生基础设施</text>

  <!-- ── Divider ── -->
  <line x1="60" y1="376" x2="900" y2="376" stroke="url(#dividerGrad)" stroke-width="1"/>

  <!-- ── Three stats ── -->
  <!-- Stat 1: 10+ -->
  <g transform="translate(60, 390)">
    <text y="52" font-family="'Courier New', monospace" font-size="48" font-weight="700" fill="#D4AF37">10+</text>
    <text y="74" font-family="'Noto Sans SC', sans-serif" font-size="13" fill="#A1A1AA" letter-spacing="0.5">微服务模块</text>
  </g>

  <!-- Vertical separator 1 -->
  <line x1="230" y1="400" x2="230" y2="468" stroke="#D4AF37" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Stat 2: 数万行 -->
  <g transform="translate(250, 390)">
    <text y="52" font-family="'Courier New', monospace" font-size="48" font-weight="700" fill="#D4AF37">数万行</text>
    <text y="74" font-family="'Noto Sans SC', sans-serif" font-size="13" fill="#A1A1AA" letter-spacing="0.5">Go 生产代码</text>
  </g>

  <!-- Vertical separator 2 -->
  <line x1="480" y1="400" x2="480" y2="468" stroke="#D4AF37" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Stat 3: 99.9% -->
  <g transform="translate(500, 390)">
    <text y="52" font-family="'Courier New', monospace" font-size="48" font-weight="700" fill="#D4AF37">99.9%</text>
    <text y="74" font-family="'Noto Sans SC', sans-serif" font-size="13" fill="#A1A1AA" letter-spacing="0.5">系统可用性</text>
  </g>

  <!-- ── Bottom bar ── -->
  <!-- Bottom-left: status -->
  <circle cx="66" cy="578" r="5" fill="#F59E0B"/>
  <text x="80" y="583" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#A1A1AA" letter-spacing="0.5">正在求职 / Go 后端工程师</text>
  <!-- Bottom-center: tech stack -->
  <circle cx="390" cy="578" r="2" fill="#A1A1AA" fill-opacity="0.4"/>
  <text x="402" y="583" font-family="'Courier New', monospace" font-size="13" fill="#A1A1AA" fill-opacity="0.6" letter-spacing="0.3">Go · Kitex · CloudWeGo · Iceberg</text>

  <!-- Bottom-right: URL -->
  <text x="1144" y="583" text-anchor="end" font-family="'Courier New', 'JetBrains Mono', monospace" font-size="13" fill="#A1A1AA" fill-opacity="0.55" letter-spacing="0.5">masonsxu.github.io</text>

  <!-- Bottom-right decorative accent line -->
  <line x1="990" y1="590" x2="1148" y2="590" stroke="#D4AF37" stroke-opacity="0.3" stroke-width="1"/>

</svg>
